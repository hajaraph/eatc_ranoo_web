name: EATC CI et CD

on:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKER_HOST_REGISTRY_NAS }}/eatc-web

jobs:
  construction-image:
    name: Construction et envoi de l'image
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Recuperation du code source
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion au registre Docker prive
        run: |
          echo "${{ secrets.DOCKER_KEY_REGISTRY_NAS }}" | docker login https://${{ secrets.DOCKER_HOST_REGISTRY_NAS }} -u ${{ secrets.DOCKER_USER_REGISTRY }} --password-stdin

      - name: Construction et envoi de l'image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

  deploiement:
    name: Recuperation et deploiement
    needs: construction-image
    if: success()
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploiement sur le serveur
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_PRIVACY_KEY }}
          script: |
            echo "=== DEMARRAGE DU DEPLOIEMENT EATC ==="

            cd eatc_ranoo
            git pull origin main --no-rebase

            echo "Recuperation de la nouvelle image..."
            docker compose pull

            echo "Redemarrage des conteneurs..."
            docker compose down --remove-orphans
            docker compose up -d --wait

            echo "Verification des conteneurs..."
            docker compose ps

            echo "=== DEPLOIEMENT EATC TERMINE AVEC SUCCES ==="