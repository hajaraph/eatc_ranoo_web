<div class="card-body">
    <h4 class="text-center mb-5">Nouvelle Commune</h4>
    <form method="post">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-4 mt-4">
                <div class="form-floating">
                    <select name="region" id="region" class="form-select shadow-none border-start-0 border-top-0 border-end-0 rounded-0" required>
                        <option selected hidden>Selectionné la région</option>
                        {% for row in regions %}
                            <option value="{{ row.pk }}">{{ row.region }}</option>
                        {% endfor %}
                    </select>
                    <label for="region">Région</label>
                </div>
            </div>
            <div class="col-md-4 mt-4">
                <div class="form-floating">
                    <input type="text" name="commune" id="commune" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" placeholder="">
                    <label for="commune">Commune</label>
                </div>
            </div>
            <div class="col-md-4 mt-4">
                <div class="form-floating">
                    <input type="text" name="cp_commune" id="cp_commune" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" placeholder="">
                    <label for="cp_commune">CP Commune</label>
                </div>
            </div>
        </div>
        <div class="d-flex justify-content-end mt-5">
            <button class="btn btn-success" type="submit">
                <i class="fas fa-save"></i>
                Enregistrer
            </button>
        </div>
    </form>
</div>
