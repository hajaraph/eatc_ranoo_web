<div class="card-body px-4">
    <h4 class="text-center mb-5">Nouveau Branchement</h4>
    <form method="post">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-4 col-sm-12 mt-4">
                <div class="form-floating">
                    <input type="text" name="branchement" id="branchement" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" placeholder="" required>
                    <label for="branchement">Nom du Branchement *</label>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-4 col-sm-12 mt-5">
                <label for="tva_applique">
                    <input type="checkbox" name="tva_applique" id="tva_applique" class="form-inline shadow-none">
                    TVA Applique
                </label>
            </div>
            <div class="col-md-4 col-sm-12 mt-5">
                <label for="taxe_applique">
                    <input type="checkbox" name="taxe_applique" id="taxe_applique" class="form-inline shadow-none">
                    Taxe Applique
                </label>
            </div>
        </div>
        <div class="d-flex justify-content-end mt-5">
            <button class="btn btn-success" type="submit">
                <i class="fas fa-save"></i>
                Enregistrer
            </button>
        </div>
    </form>
</div>
