<div class="card-body">
    <h4 class="text-center">Relevé du {{ releve.date_releve|date:'d/m/Y' }}</h4>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="d-flex flex-wrap justify-content-between mt-5">
            <div class="w-50 p-5">
                <div class="row">
                    <div class="col-md-8 mt-4">
                        <div class="form-floating">
                            <input type="text" name="num_compteur" id="num_compteur" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ releve.num_compteur_id }}" placeholder="" readonly>
                            <label for="num_compteur">Numéro Compteur</label>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-8 mt-4">
                        <div class="form-floating">
                            <input type="date" name="date_releve" id="date_releve_m" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ releve.date_releve|date:'Y-m-d' }}" placeholder="" required>
                            <label for="date_releve_m">Date Relevé</label>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-8 mt-4">
                        <div class="form-floating">
                            <input type="text" name="volume" id="volume" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ releve.volume }}" placeholder="" required>
                            <label for="volume">Volume</label>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-8 mt-4">
                        <div class="form-floating">
                            <input type="text" name="utilisateur" id="utilisateur" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ request.session.nom_utilisateur }} {{ request.session.prenom_utilisateur }}" readonly>
                            <label for="utilisateur">Utilisateur</label>
                        </div>
                    </div>
                </div>
                <div class="d-flex justify-content-end mt-5">
                    <button type="submit" class="btn btn-success" onclick="return confirm('Êtes-vous sûr de vouloir validé la modification ?')">
                        <i class="fas fa-save"></i>
                        Enregistrer
                    </button>
                </div>
            </div>
            <div class="w-50 p-5">
                <label for="image_compteur" class="btn btn-outline-secondary w-100"><i class="fas fa-image"></i> Choisir une image</label>
                <input type="file" name="image_compteur" id="image_compteur" class="invisible" value="{{ releve.image_compteur }}" accept="image/jpeg" >
                <img src="{% if releve.image_compteur %}{{ releve.image_compteur.url }}{% endif %}" id="image_preview" class="img-fluid figure-img rounded" alt="Image de compteur">
            </div>
        </div>
    </form>
</div>
