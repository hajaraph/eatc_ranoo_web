{% load static l10n %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="{% static 'logo/img.png' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="{% static 'fontawesome/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'css/style_general.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>{{ title_missions }}</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --surface-color: #ffffff;
            --bg-color: #f3f4f6;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border-radius: 16px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
        }

        .page-header {
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e5e7eb;
        }

        /* ... autres styles ... */

    <div class="main-content-area">
        <div class="container-fluid p-0">
            <div class="row flex-nowrap">
                <div class="col p-0 d-flex flex-column" style="height: 100vh; overflow: hidden;">
                    <div class="content-wrapper flex-grow-1 px-4 pt-3 pb-4" style="overflow-y: auto;">
                        
                        <!-- Header Section -->
                        <div class="container-xl">
                            <div class="page-header d-flex justify-content-between align-items-end">
                                <div>
                                    <h1 class="page-title">
                                        Missions en Attente
                                        {% if count > 0 %}
                                            <span class="badge-count">{{ count }}</span>
                                        {% endif %}
                                    </h1>
                                    <p class="text-secondary mb-0 mt-2">
                                        Validez les relevés envoyés par les agents terrain pour facturation.
                                    </p>
                                </div>
                                <div class="text-end text-muted">
                                    <small><i class="fas fa-clock me-2"></i>Dernière synchro: {% now "H:i" %}</small>
                                </div>
                            </div>

                            {% if messages %}
                            <div class="mb-4">
                                {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} alert-dismissible fade show border-0 shadow-sm" role="alert" style="border-radius: 12px;">
                                    <i class="fas fa-info-circle me-2"></i> {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                                {% endfor %}
                            </div>
                            {% endif %}

                            {% if releves_data %}
                                <div class="mission-grid">
                                    {% for item in releves_data %}
                                    <div class="mission-card" id="card-{{ item.releve.id_releve }}">
                                        <!-- Card Header -->
                                        <div class="card-header-status">
                                            <div class="compteur-badge">
                                                <i class="fas fa-tachometer-alt"></i>
                                                {{ item.releve.num_compteur_id }}
                                            </div>
                                            <div class="date-badge">
                                                <i class="far fa-calendar-alt"></i>
                                                {{ item.releve.date_releve|date:"d M Y" }}
                                            </div>
                                        </div>

                                        <!-- Card Content -->
                                        <div class="card-content">
                                            <!-- Image with Overlay -->
                                            <div class="image-container" data-bs-toggle="modal" data-bs-target="#imageModal{{ item.releve.id_releve }}">
                                                {% if item.releve.image_compteur %}
                                                    <img src="{{ item.releve.image_compteur.url }}" alt="Photo compteur" class="mission-image">
                                                    <div class="image-overlay">
                                                        <span class="badge bg-white text-dark rounded-pill px-3 py-2">
                                                            <i class="fas fa-search-plus me-2"></i>Agrandir
                                                        </span>
                                                    </div>
                                                {% else %}
                                                    <div class="d-flex align-items-center justify-content-center h-100 bg-light text-secondary">
                                                        <div class="text-center">
                                                            <i class="fas fa-image fa-2x mb-2"></i>
                                                            <p class="small m-0">Pas de photo</p>
                                                        </div>
                                                    </div>
                                                {% endif %}
                                            </div>

                                            <!-- Key Stats -->
                                            <div class="stats-grid">
                                                <div class="stat-item">
                                                    <div class="stat-label">Nouvel Index</div>
                                                    <div class="stat-value highlight">{{ item.releve.volume|default:0 }} <small>m³</small></div>
                                                </div>
                                                <div class="stat-item">
                                                    <div class="stat-label">Conso.</div>
                                                    <div class="stat-value">{{ item.releve.conso|default:0 }} <small>m³</small></div>
                                                </div>
                                            </div>

                                            <!-- Details List -->
                                            <div class="info-list">
                                                <div class="info-item">
                                                    <div class="info-icon"><i class="fas fa-user"></i></div>
                                                    <div class="info-text">
                                                        <span class="d-block text-xs text-muted">Client</span>
                                                        <strong>{{ item.client.nom_client|default:"Inconnu" }} {{ item.client.prenom_client|default:"" }}</strong>
                                                    </div>
                                                </div>
                                                <div class="info-item">
                                                    <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                                                    <div class="info-text">
                                                        <span class="d-block text-xs text-muted">Adresse</span>
                                                        <span class="text-dark">{{ item.contrat.adresse_contrat|default:"Non spécifiée" }}</span>
                                                    </div>
                                                </div>
                                                <div class="info-item">
                                                    <div class="info-icon"><i class="fas fa-user-tie"></i></div>
                                                    <div class="info-text">
                                                        <span class="d-block text-xs text-muted">Relevé par</span>
                                                        <span class="text-dark">{{ item.agent.nom_utilisateur }}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Card Actions -->
                                        <div class="card-actions">
                                            <button type="button" 
                                                    class="btn-modern btn-modern-danger"
                                                    data-bs-toggle="modal" 
                                                    data-bs-target="#rejectModal{{ item.releve.id_releve }}">
                                                <i class="fas fa-times"></i> Rejeter
                                            </button>
                                            <a href="{% url 'confirmer_mission' item.releve.id_releve %}" 
                                               class="btn-modern btn-modern-success btn-validate"
                                               data-id="{{ item.releve.id_releve }}">
                                                <i class="fas fa-check"></i> Valider
                                            </a>
                                        </div>
                                    </div>

                                    <!-- Modal Image -->
                                    <div class="modal fade" id="imageModal{{ item.releve.id_releve }}" tabindex="-1">
                                        <div class="modal-dialog modal-lg modal-dialog-centered">
                                            <div class="modal-content">
                                                <div class="modal-header">
                                                    <h5 class="modal-title fw-bold">Preuve Photo #{{ item.releve.num_compteur_id }}</h5>
                                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                                </div>
                                                <div class="modal-body p-0 text-center bg-dark">
                                                    {% if item.releve.image_compteur %}
                                                    <img src="{{ item.releve.image_compteur.url }}" class="img-fluid" style="max-height: 85vh;">
                                                    {% endif %}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Modal Rejet -->
                                    <div class="modal fade" id="rejectModal{{ item.releve.id_releve }}" tabindex="-1">
                                        <div class="modal-dialog modal-dialog-centered">
                                            <div class="modal-content">
                                                <form method="post" action="{% url 'rejeter_mission' item.releve.id_releve %}" class="reject-form" data-id="{{ item.releve.id_releve }}">
                                                    {% csrf_token %}
                                                    <div class="modal-header bg-danger text-white border-0">
                                                        <h5 class="modal-title">
                                                            <i class="fas fa-exclamation-circle me-2"></i>Rejeter le relevé
                                                        </h5>
                                                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                                    </div>
                                                    <div class="modal-body p-4">
                                                        <div class="text-center mb-4">
                                                            <div class="avatar-lg bg-danger-subtle text-danger rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center" style="width:60px; height:60px;">
                                                                <i class="fas fa-times fa-2x"></i>
                                                            </div>
                                                            <h5>Êtes-vous sûr ?</h5>
                                                            <p class="text-muted">Si vous rejetez ce relevé, l'agent <strong>{{ item.agent.nom_utilisateur }}</strong> recevra une notification pour refaire la mission.</p>
                                                        </div>
                                                        
                                                        <div class="mb-3 text-start">
                                                            <label class="form-label fw-bold text-dark">Raison du rejet <span class="text-danger">*</span></label>
                                                            <textarea name="motif_rejet" class="form-control bg-light border-0" rows="3" 
                                                                      placeholder="Ex: Photo floue, chiffres illisibles..." required style="resize: none;"></textarea>
                                                        </div>
                                                    </div>
                                                    <div class="modal-footer border-0 bg-light">
                                                        <button type="button" class="btn btn-link text-secondary text-decoration-none" data-bs-dismiss="modal">Annuler</button>
                                                        <button type="submit" class="btn btn-danger px-4 rounded-pill">
                                                            Confirmer le Rejet
                                                        </button>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                    {% endfor %}
                                </div>
                            {% else %}
                                <div class="empty-state">
                                    <div class="empty-icon-wrapper">
                                        <i class="fas fa-check-double"></i>
                                    </div>
                                    <h3 class="fw-bold mb-3">Tout est à jour !</h3>
                                    <p class="text-muted mb-4">Aucune mission en attente de validation pour le moment. Bon travail !</p>
                                    <a href="{% url 'facture' %}" class="btn btn-primary rounded-pill px-4">
                                        <i class="fas fa-file-invoice-dollar me-2"></i>Voir les Factures
                                    </a>
                                </div>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'datatable/jquery/jquery-3.7.0.min.js' %}"></script>
    <script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'fontawesome/js/all.min.js' %}"></script>
    
    <script>
        // Animation d'apparition progressive
        document.addEventListener('DOMContentLoaded', function() {
            const cards = document.querySelectorAll('.mission-card');
            cards.forEach((card, index) => {
                card.style.animationDelay = `${index * 0.1}s`;
            });

            // Fonction pour afficher les messages du template message.html
            function showMessage(html) {
                // Insérer le HTML dans le body
                document.body.insertAdjacentHTML('beforeend', html);
                
                // Récupérer les nouvelles alertes insérées (les dernières)
                const alerts = document.querySelectorAll('.modern-alert:not(.initialized)');
                
                alerts.forEach(alert => {
                    alert.classList.add('initialized');
                    
                    // Initialiser l'auto-hide manuellement
                    setTimeout(() => {
                        alert.classList.add('auto-hide');
                    }, 10);
                    
                    // Auto remove
                    setTimeout(() => {
                        if (alert.parentNode) alert.remove();
                    }, 5000);
                });
            }

            // Gestionnaire générique de réponse AJAX
            function handleResponse(response, cardId) {
                if (response.success) {
                    const card = document.getElementById(`card-${cardId}`);
                    if (card) {
                        // Animation de suppression
                        card.style.transform = 'scale(0.9) translateX(100px)';
                        card.style.opacity = '0';
                        
                        setTimeout(() => {
                            card.remove();
                            
                            // Mettre à jour le compteur
                            const badge = document.querySelector('.badge-count');
                            const navBadge = document.getElementById('missions-badge');
                            
                            if (badge) {
                                let count = parseInt(badge.textContent) - 1;
                                count = Math.max(0, count);
                                badge.textContent = count;
                                if (count <= 0) badge.style.display = 'none';
                                
                                // Update Navbar badge aussi si possible
                                if(navBadge) {
                                    navBadge.textContent = count;
                                    if (count <= 0) document.getElementById('missions-nav-item').style.display = 'none';
                                }
                            }
                            
                            // Si plus de cartes, rediriger vers les factures
                            if (document.querySelectorAll('.mission-card').length === 0) {
                                // Afficher un message de succès avant la redirection
                                const successMsg = `
                                    <div class="modern-alert alert-success mt-5" style="top: 50%; left: 50%; transform: translate(-50%, -50%); position: fixed;">
                                        <div class="alert-content">
                                            <div class="alert-icon"><i class="fas fa-check-circle fa-2x"></i></div>
                                            <div class="alert-message">
                                                <h5>Terminé !</h5>
                                                <p class="mb-0">Toutes les missions ont été traitées. Redirection vers les factures...</p>
                                            </div>
                                        </div>
                                    </div>
                                `;
                                document.body.insertAdjacentHTML('beforeend', successMsg);
                                
                                setTimeout(() => {
                                    window.location.href = "{% url 'facture' %}";
                                }, 2000);
                            }
                        }, 300);
                    }
                }
                
                if (response.message_html) {
                    showMessage(response.message_html);
                }
            }

            // Intercepter les clics sur Valider (AJAX)
            document.querySelectorAll('.btn-validate').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (!confirm('Confirmer ce relevé et générer la facture ?')) return;

                    const url = this.getAttribute('href');
                    const cardId = this.dataset.id;
                    const btnElement = this;
                    
                    // État de chargement
                    btnElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                    btnElement.classList.add('disabled');

                    fetch(url, {
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    })
                    .then(res => res.json())
                    .then(data => handleResponse(data, cardId))
                    .catch(err => {
                        console.error(err);
                        btnElement.innerHTML = '<i class="fas fa-check"></i> Valider';
                        btnElement.classList.remove('disabled');
                        alert("Erreur lors de la communication avec le serveur.");
                    });
                });
            });

            // Intercepter la soumission des formulaires de rejet (AJAX)
            document.querySelectorAll('.reject-form').forEach(form => {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const url = this.action;
                    const formData = new FormData(this);
                    
                    // Récupérer le modal
                    const modalEl = this.closest('.modal');
                    const modal = bootstrap.Modal.getInstance(modalEl);
                    const cardId = this.dataset.id;
                    const submitBtn = this.querySelector('button[type="submit"]');
                    
                    // État de chargement
                    const originalBtnText = submitBtn.innerHTML;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Traitement...';
                    submitBtn.disabled = true;

                    fetch(url, {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    })
                    .then(res => res.json())
                    .then(data => {
                        modal.hide();
                        handleResponse(data, cardId);
                        
                        // Reset form (au cas où)
                        submitBtn.innerHTML = originalBtnText;
                        submitBtn.disabled = false;
                        this.reset();
                    })
                    .catch(err => {
                        console.error(err);
                        submitBtn.innerHTML = originalBtnText;
                        submitBtn.disabled = false;
                        alert("Erreur lors de la communication avec le serveur.");
                    });
                });
            });
        });
    </script>
</body>
</html>
