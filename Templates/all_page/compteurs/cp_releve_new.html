<div class="card-body">
    <h4 class="text-center">Nouveau Relevé - Compteur Principal</h4>
    <form method="post" action="{% url 'releve_cp_new' compteur_principal.pk %}" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="d-flex flex-wrap justify-content-between mt-5">
            <div class="w-50 p-5">
                <div class="row">
                    <div class="col-md-8 mt-4">
                        <div class="form-floating">
                            <input type="text" name="num_compteur_principale" id="num_compteur_principale" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ compteur_principal.num_compteur_principale }}" placeholder="" readonly>
                            <label for="num_compteur_principale">N° Gros Compteur*</label>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-8 mt-4">
                        <div class="form-floating">
                            <input type="date" name="date_releve" id="date_releve" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" placeholder="" required>
                            <label for="date_releve">Date Relevé*</label>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-8 mt-4">
                        <div class="form-floating">
                            <input type="number" name="volume" id="volume" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" placeholder="" required min="0" {% if dernier_releve %}min="{{ dernier_releve.volume }}"{% endif %}>
                            <label for="volume">Volume (m³)*</label>
                        </div>
                        {% if dernier_releve %}
                        <small class="text-muted">Dernier volume : {{ dernier_releve.volume }} m³ ({{ dernier_releve.date_releve|date:"d/m/Y" }})</small>
                        {% endif %}
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-8 mt-4">
                        <div class="form-floating">
                            <input type="text" name="utilisateur" id="utilisateur" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ request.session.nom_utilisateur }} {{ request.session.prenom_utilisateur }}" readonly>
                            <label for="utilisateur">Utilisateur*</label>
                        </div>
                    </div>
                </div>
                <div class="d-flex justify-content-end mt-5">
                    <a href="{% url 'compteur_principale_detail' compteur_principal.pk %}" class="btn btn-secondary mx-2">
                        <i class="fas fa-times"></i>
                        Annuler
                    </a>
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save"></i>
                        Enregistrer
                    </button>
                </div>
            </div>
            <div class="w-50 p-5">
                <label for="image" class="btn btn-outline-secondary w-100">
                    <i class="fas fa-file-image"></i>
                    Choisir l'image de Compteur
                </label>
                <input type="file" name="image_compteur" id="image" class="invisible" accept="image/jpeg, image/png">
                <img src="" id="image_preview" class="img-fluid figure-img rounded-2" alt="">
            </div>
        </div>
    </form>
</div>
