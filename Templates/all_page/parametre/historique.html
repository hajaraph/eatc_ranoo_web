<div class="card-body">
    <h4 class="text-center mb-4">Historique</h4>
        <div class="table-responsive p-1">
            <table class="table" id="myTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Utilisateur</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in historique %}
                    <tr>
                        <td>{{ row.date_historique|date:'d/m/y // H:m:s' }}</td>
                        <td>{{ row.type_historique }}</td>
                        <td>
                            {{ row.utilisateur.nom_utilisateur }}
                            <span class="badge bg-primary">{{ row.utilisateur.role.role }}</span>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
</div>
