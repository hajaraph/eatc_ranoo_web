<div class="card-body">
    <div class="content">
        <div class="d-flex flex-wrap">
            <div class="col-md-3 text-center">
                {% if request.session.photo_utilisateur %}
                <img src="{{ request.session.photo_utilisateur }}" class="img-thumbnail card-img-top rounded-circle" style="width: 150px; height: 150px; object-fit: cover" alt="{{ request.session.nom_utilisateur }} {{ request.session.prenom_utilisateur }}">
                {% else %}
                <i class="fas fa-user-circle" style="font-size: 100px"></i>
                {% endif %}
            </div>
            <div class="col">
                <div class="row">
                    <div class="col-md-4 mt-4">
                        <div class="form-floating">
                            <input type="text" name="nom_utilisateur" id="nom_utilisateur" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ request.session.nom_utilisateur }}" readonly>
                            <label for="nom_utilisateur">Nom</label>
                        </div>
                    </div>
                    <div class="col-md-4 mt-4">
                        <div class="form-floating">
                            <input type="text" name="prenom_utilisateur" id="prenom_utilisateur" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ request.session.prenom_utilisateur }}" readonly>
                            <label for="prenom_utilisateur">Prénom</label>
                        </div>
                    </div>
                    <div class="col-md-4 mt-4">
                        <div class="form-floating">
                            <input type="text" name="role_utilisateur" id="role_utilisateur" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ request.session.role_utilisateur }}" readonly>
                            <label for="role_utilisateur">Role</label>
                        </div>
                    </div>
                    <div class="col-md-4 mt-4">
                         <div class="form-floating">
                            <input type="text" name="initial_utilisateur" id="initial_utilisateur" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ request.session.initial_utilisateur }}" readonly>
                            <label for="initial_utilisateur">Utilisateur créé par</label>
                        </div>
                    </div>
                    <div class="col-md-4 mt-4">
                         <div class="form-floating">
                            <input type="text" name="num_utilisateur" id="num_utilisateur" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ request.session.num_utilisateur }}" readonly>
                            <label for="num_utilisateur">Téléphone</label>
                        </div>
                    </div>
                </div>
                <div class="row mt-3">
                    <a href="{% url 'changer_motde_passe' %}" class="text-decoration-none fw-bolder">Changer de Mot de passe</a>
                </div>
                <div class="d-flex justify-content-end mt-4">
                    <a href="{% url 'profile_modifier' %}" class="btn btn-warning">
                        <i class="fas fa-edit"></i>
                        Modifier
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
