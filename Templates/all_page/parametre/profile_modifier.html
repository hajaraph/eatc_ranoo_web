{% load static %}
<div class="card-body">
    <div class="content">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="d-flex flex-wrap">
                <div class="col-md-3 text-center">
                    <div class="position-relative">
                        {% if request.session.photo_utilisateur %}
                        <img src="{{ request.session.photo_utilisateur }}" id="image_preview" class="img-thumbnail card-img-top rounded-circle" style="width: 150px; height: 150px; object-fit: cover" alt="{{ request.session.nom_utilisateur }} {{ request.session.prenom_utilisateur }}">
                        {% else %}
                        <img src="" id="image_preview" class="img-thumbnail card-img-top rounded-circle" style="width: 150px; height: 150px; object-fit: cover" alt="{{ request.session.nom_utilisateur }} {{ request.session.prenom_utilisateur }}" hidden>
                        <i class="fas fa-user-circle" style="font-size: 100px"></i>
                        {% endif %}
                        <label for="image" class="btn btn-sm btn-secondary rounded-pill w-75 mt-4 shadow-none">Choisir une image</label>
                        <input type="file" name="photo_utilisateur" id="image" class="invisible" accept="image/jpeg, image/png">
                    </div>
                </div>
                <div class="col-md">
                    <div class="row">
                        <div class="col-md-4 mt-4">
                            <div class="form-floating">
                                <input type="text" name="nom_utilisateur" id="nom_utilisateur" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ request.session.nom_utilisateur }}">
                                <label for="nom_utilisateur">Nom</label>
                            </div>
                        </div>
                        <div class="col-md-4 mt-4">
                            <div class="form-floating">
                                <input type="text" name="prenom_utilisateur" id="prenom_utilisateur" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ request.session.prenom_utilisateur }}">
                                <label for="prenom_utilisateur">Prénom</label>
                            </div>
                        </div>
                        <div class="col-md-4 mt-4">
                            <div class="form-floating">
                                <input type="text" name="role_utilisateur" id="role_utilisateur" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ request.session.role_utilisateur }}" readonly>
                                <label for="role_utilisateur">Role</label>
                            </div>
                        </div>
                        <div class="col-md-4 mt-4">
                             <div class="form-floating">
                                <input type="text" name="initial_utilisateur" id="initial_utilisateur" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ request.session.initial_utilisateur }}" readonly>
                                <label for="initial_utilisateur">Initial</label>
                            </div>
                        </div>
                        <div class="col-md-4 mt-4">
                             <div class="form-floating">
                                <input type="text" name="num_utilisateur" id="num_utilisateur" class="form-control shadow-none border-start-0 border-top-0 border-end-0 rounded-0" value="{{ request.session.num_utilisateur }}">
                                <label for="num_utilisateur">Téléphone</label>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-end mt-4">
                        <button class="btn btn-success" type="submit">
                            <i class="fas fa-save"></i>
                            Enregistrer
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
