networks:
  webapp_preprod:
  traefik_preprod:
    external: true
services:
  db:
    image: postgres:16
    container_name: eatc-db
    env_file: .env
    volumes:
      - /volume1/Docker/eatc/postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5400:5432"
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - webapp_preprod
      
  web:
    image: ${DOCKER_HOST_REGISTRY_NAS}/eatc-web:latest
    container_name: eatc-web
    command: gunicorn Rel_Compteur.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 600 --keep-alive 5 --access-logfile - --error-logfile -
    env_file: .env
    volumes:
      - ./static/media:/app/static/media
    labels:
      - traefik.enable=true
      - traefik.http.routers.eatc.rule=Host(`app.eatc.me`)
      - traefik.http.routers.eatc.entrypoints=websecure
      - traefik.http.routers.eatc.tls.certresolver=myresolver
      - traefik.http.services.eatc.loadbalancer.server.port=8000
      - traefik.docker.network=traefik_preprod
      # Configuration pour gros fichiers - Désactiver buffering
      - traefik.http.middlewares.eatc-buffering.buffering.forwardHeaders=false
      - traefik.http.routers.eatc.middlewares=eatc-buffering
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - webapp_preprod
      - traefik_preprod

  db-backup:
    image: postgres:16
    container_name: eatc-db-backup
    env_file: .env
    volumes:
      - /volume1/Docker/eatc/backups:/backups
    environment:
      - PGHOST=db
      - PGUSER=${DB_USER}
      - PGPASSWORD=${DB_PASSWORD}
      - PGDATABASE=${DB_NAME}
    entrypoint: >
      bash -c " while true; do
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
        echo \"[$$TIMESTAMP] Starting backup...\";
        pg_dump -Fc > /backups/eatc_db_$$TIMESTAMP.dump;
        echo \"[$$TIMESTAMP] Backup completed: eatc_db_$$TIMESTAMP.dump\";
        # Garder seulement les 7 derniers backups
        ls -t /backups/eatc_db_*.dump | tail -n +8 | xargs -r rm;
        echo \"Sleeping 24h until next backup...\";
        sleep 86400;
      done"
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - webapp_preprod

  redis:
    image: redis:7-alpine
    container_name: eatc-redis
    volumes:
      - /volume1/Docker/eatc/redis_data:/data
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - webapp_preprod

  celery-worker:
    image: ${DOCKER_HOST_REGISTRY_NAS}/eatc-web:latest
    container_name: eatc-celery-worker
    command: celery -A Tasks worker --loglevel=info --concurrency=2
    env_file: .env
    volumes:
      - ./static/media:/app/static/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - webapp_preprod
